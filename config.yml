  bin_path: "/opt/homebrew/bin"
  storage:
    directory:
#      path: "/home/vadim/tmp/pg_dump_test"
      path: "/Users/vvoitenko/tmp/pgdump_test"

restore:
  pg_restore_options:
#    verbose: true
#    dbname: "user=postgres dbname=test_restore"
    dbname: "host=/tmp port=5432 user=vvoitenko dbname=demo_restore"
#    use-list: "/Users/vvoitenko/gits/woyten/greenfuscator/cmd/greenmask/test.list"

dump:
  pg_dump_options:
#    verbose: true
    dbname: "host=/tmp port=5432 user=vvoitenko dbname=demo"
#    dbname: "user=postgres dbname=test"
#    exclude-schema: "(\"teSt\"*|test*)"
#    table:
#      - "public.cards_*"
    jobs: 5
#    load-via-partition-root: true
    exclude-table-data: "public.test1_id_seq"

  transformers:
    - schema: "public"
      name: "test1"
      columns:
        - name: "title"
          transformer:
            name: "Replace"
            params:
              value: "test"

    - schema: "public"
      name: "cards_test"
      columns:
        - name: "card_number"
          transformer:
            name: "CreditCard"
            params:
              type: "Number"
        - name: "ex_date"
          transformer:
            name: "CreditCard"
            params:
              type: "ExpirationDateString"
        - name: "vendor"
          transformer:
            name: "CreditCard"
            params:
              type: "VendorName"

transformers:
  custom:
    bin_path: ""
    type: "attr"
    param:
      a:
