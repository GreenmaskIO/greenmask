connection: "postgres://test:1234@localhost/test?sslmode=disabled"
engine: "postgres"
transformers:
  - schema: "public"
    name: "test1"
    columns:
      - name: "title"
        transformer:
          name: "Replace"
          params:
            value: "test"
  - schema: "public"
    name: "cards_test"
    columns:
      - name: "card_number"
        transformer:
          name: "CreditCard"
          params:
            type: "Number"
      - name: "ex_date"
        transformer:
          name: "CreditCard"
          params:
            type: "ExpirationDateString"
      - name: "vendor"
        transformer:
          name: "CreditCard"
          params:
            type: "VendorName"
