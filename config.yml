common:
  log-level: "debug"
  log-format: "text"
  bin_path: "/usr/bin"
  #  bin_path: "/opt/homebrew/bin"
  storage:
    directory:
      path: "/home/vadim/tmp/pg_dump_test"
#      path: "/Users/vvoitenko/tmp/pgdump_test"

restore:
  pg_restore_options:
    #    verbose: true
    dbname: "user=postgres dbname=demo_restore"
  #    dbname: "host=/tmp port=5432 user=vvoitenko dbname=demo_restore"
  #    use-list: "/Users/vvoitenko/gits/woyten/greenfuscator/cmd/greenmask/test.list"

  scripts:
    # preflight, pre-data, data, post-data, post-flight
    pre-flight:
      - name: "pre-flight test script [1]"
        query: "create table script_test(stage text)"
      - name: "pre-flight test script [1]"
        query: "insert into script_test values('pre-flight')"
    pre-data:
      - name: "pre-data before test script [1]"
        when: "before"
        query: "insert into script_test values('pre-data before')"
      - name: "pre-data after test script [1]"
        when: "after"
        query: "insert into script_test values('pre-data after')"
    data:
      - name: "data before test script [1]"
        when: "before"
        query: "insert into script_test values('data before')"
      - name: "data after test script [1]"
        when: "after"
        query: "insert into script_test values('data after')"
    post-data:
      - name: "post-data before test script [1]"
        when: "before"
        query: "insert into script_test values('post-data before')"
      - name: "post-data after test script [1]"
        when: "after"
        query: "insert into script_test values('post-data after')"
    post-flight:
      - name: "post-flight test script [1]"
        query: "insert into script_test values('post-flight')"

dump:
  pg_dump_options:
    #    verbose: true
    # dbname: "host=/tmp port=5432 user=vvoitenko dbname=demo"
    dbname: "user=postgres dbname=demo"
    #    exclude-schema: "(\"teSt\"*|test*)"
    #    table:
    #      - "public.cards_*"
    jobs: 10
    #    load-via-partition-root: true
  #    exclude-table-data: "public.test1_id_seq"

  transformers:
    - schema: "bookings"
      name: "flights2"
      query: "select * from bookings.flights order by aircraft_code limit 10"
      columns:
        - name: "scheduled_departure"
          transformer:
            name: "RandomDate"
            params:
              min: "2023-01-01 10:43:31.318664+03"
              max: "2023-05-19 10:43:31.318664+03"

    - schema: "typetest"
      name: "test_int"
      columns:
        - name: "at1"
          transformer:
            name: "RandomInt"
            params: {"nullable": true, min: 1, max: 100}
        - name: "at2"
          transformer:
            name: "RandomInt"
            params: {"nullable": true, min: 100, max: 200}
        - name: "at3"
          transformer:
            name: "RandomInt"
            params: {"nullable": true, min: 200, max: 300}
        - name: "at4"
          transformer:
            name: "RandomInt"
            params: { min: 300, max: 400 }
        - name: "at5"
          transformer:
            name: "RandomInt"
            params: { min: 400, max: 500 }
        - name: "at6"
          transformer:
            name: "RandomInt"
            params: { min: 500, max: 600 }

    - schema: "typetest"
      name: "test_bool"
      columns:
        - name: "at1"
          transformer:
            name: "RandomBool"
            params: { "nullable": true}
        - name: "at2"
          transformer:
            name: "RandomBool"

transformers:
  custom:
    bin_path: ""
    type: "attr"
    param:
      a:
      b:

