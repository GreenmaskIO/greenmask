version: '3'

services:
  storage:
    image: minio/minio:latest
    ports:
      - ":9000:9000"
      - ":9001:9001"
    environment:
      - "MINIO_ROOT_USER=Q3AM3UQ867SPQQA43P2F"
      - "MINIO_ROOT_PASSWORD=zuf+tfteSlswRu7BJ86wekitnifILbZam1KYY3TG"
    entrypoint: sh
    command: >
      -c 'mkdir -p /export/adventureworks && minio server /export --console-address :9001'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 1s
      retries: 3

  db:
    volumes:
      - "/var/lib/postgresql/data"
    image: postgres:16
    ports:
      - "54316:5432"
    restart: always
    environment:
      POSTGRES_PASSWORD: example
    healthcheck:
      test: [ "CMD", "psql", "-U", "postgres" ]
      interval: 5s
      timeout: 1s
      retries: 3

  dbs-filler:
    environment:
      PGPASSWORD: "example"
      FILE_DUMP: "demo-small-en.zip"
      TMP_DIR: "/tmp/schema"
    build:
      context: docker/playground/filldb
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy

  greenmask:
    volumes:
      - ./tests/playground:/var/run/playground
    build:
      dockerfile: docker/playground/greenmask/Dockerfile
      context: ./
    depends_on:
      dbs-filler:
        condition: service_completed_successfully
      storage:
        condition: service_healthy
